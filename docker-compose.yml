version: "3.8"

services:
  # Serviço do Banco de Dados
  database:
    image: postgres:15-alpine
    container_name: sellsong_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sellsong
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
