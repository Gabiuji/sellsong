version: "3.8"

services:
  # Servidor do Banco de Dados (PostgreSQL)
  postgres_db:
    image: postgres:15-alpine
    container_name: sellsong_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-sellsong}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Servidor da API Node/Express
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sellsong_backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - postgres_db

  # Servidor do Frontend (React + Vite) — Novo!
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sellsong_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
